<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Loading…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; }
    iframe { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <iframe id="f" src="https://chatty-liard-pi.vercel.app/chat.html" title="content"></iframe>

  <script>
    const f = document.getElementById('f');
    f.addEventListener('load', () => {
      try { document.title = f.contentWindow.document.title; } catch (e) {}
    });
  </script>
</body>
</html>
